<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Okyuyote!</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header" @click="navigate('home')">
      <span class="header-logo">Okyuyote!</span>
      <div class="header-right" @click.stop>
        <button v-if="currentUser" class="btn-signin" @click="handleLogout">サインアウト</button>
        <button v-else class="btn-signin" @click="navigate('login')">サインイン</button>
        <button class="hamburger-btn" @click="menuOpen = true">&#9776;</button>
      </div>
    </header>
    <div class="header-spacer"></div>

    <!-- Hamburger Menu -->
      <div class="menu-overlay" :class="{ open: menuOpen }" @click="menuOpen = false"></div>
      <div class="menu-panel" :class="{ open: menuOpen }">
        <button class="menu-close" @click="menuOpen = false">&times;</button>
        <template v-if="currentUser">
          <button class="menu-item" @click="navigate('myPage')">マイページ</button>
          <button v-if="currentView === 'mapView'" class="menu-item" @click="navigate('home')">カレンダーで見る</button>
          <button v-else class="menu-item" @click="navigate('mapView')">地図で見る</button>
          <button v-if="currentUser.role === 'admin'" class="menu-item" @click="navigate('userList')">ユーザー管理</button>
          <button class="menu-item" @click="navigate('shopForm')">店舗管理</button>
          <button class="menu-item" @click="navigate('staffForm')">キャスト管理</button>
          <button class="menu-item" @click="navigate('shiftForm')">シフト管理</button>
          <button v-if="currentUser.role === 'admin' || currentUser.role === 'operator'" class="menu-item" @click="navigate('shiftImportPage')">シフト管理(自動登録)</button>
          <button v-if="currentUser.role === 'admin' || currentUser.role === 'operator'" class="menu-item" @click="navigate('shiftBulkForm')">シフト一括登録</button>
          <button class="menu-item" @click="navigate('eventForm')">イベント管理</button>
        </template>
        <template v-else>
          <button v-if="currentView === 'mapView'" class="menu-item" @click="navigate('home')">カレンダーで見る</button>
          <button v-else class="menu-item" @click="navigate('mapView')">地図で見る</button>
          <button class="menu-item" @click="navigate('introduction')">このサービスについて</button>
        </template>
      </div>

    <!-- Loading -->
    <div v-if="loading" class="loading">読み込み中</div>

    <!-- Main Content -->
    <template v-else>
      <!-- Login Page -->
      <login-page v-if="currentView === 'login'"></login-page>

      <!-- Forgot Password Page -->
      <forgot-password-page v-if="currentView === 'forgotPassword'"></forgot-password-page>

      <!-- Reset Password Page -->
      <reset-password-page v-if="currentView === 'resetPassword'"></reset-password-page>

      <!-- Register Page -->
      <register-page v-if="currentView === 'register'"></register-page>

      <!-- Shop Form -->
      <shop-form-page v-if="currentView === 'shopForm'"></shop-form-page>

      <!-- User List -->
      <user-list-page v-if="currentView === 'userList'"></user-list-page>

      <!-- Staff Form -->
      <staff-form-page v-if="currentView === 'staffForm'"></staff-form-page>

      <!-- Shift Form -->
      <shift-form-page v-if="currentView === 'shiftForm'"></shift-form-page>

      <!-- Shift Bulk Form -->
      <shift-bulk-form-page v-if="currentView === 'shiftBulkForm'"></shift-bulk-form-page>

      <!-- Shift Import Page -->
      <shift-import-page v-if="currentView === 'shiftImportPage'"></shift-import-page>

      <!-- Shift Edit -->
      <shift-edit-page v-if="currentView === 'shiftEdit'"></shift-edit-page>

      <!-- Event Form -->
      <event-form-page v-if="currentView === 'eventForm'"></event-form-page>

      <!-- My Page -->
      <my-page v-if="currentView === 'myPage'"></my-page>

      <!-- Map View -->
      <map-view-page v-if="currentView === 'mapView'"></map-view-page>

      <!-- Shop Home -->
      <shop-home-page v-if="currentView === 'shopHome'"></shop-home-page>

      <!-- Staff Home -->
      <staff-home-page v-if="currentView === 'staffHome'"></staff-home-page>

      <!-- Introduction -->
      <introduction-page v-if="currentView === 'introduction'"></introduction-page>

      <!-- Home Page -->
      <div v-if="currentView === 'home'" class="container">

        <!-- Calendar -->
        <div class="calendar-section">
          <div class="calendar-header">
            <button class="calendar-nav" @click="prevMonth">&laquo; 前月</button>
            <h2>{{ calendarTitle }}</h2>
            <button class="calendar-nav" @click="nextMonth">翌月 &raquo;</button>
          </div>
          <div class="calendar-grid">
            <div class="calendar-dow" v-for="dow in ['日','月','火','水','木','金','土']" :key="dow">{{ dow }}</div>
            <div v-for="(cell, idx) in calendarDays" :key="idx"
                 class="calendar-cell"
                 :class="{ empty: cell.empty, today: cell.isToday }"
                 :style="{ background: cell.empty ? 'transparent' : cell.gradient }"
                 @click="openDayModal(cell)">
              <template v-if="!cell.empty">
                <span class="date-num">{{ cell.day }}</span>
                <span v-if="cell.seatGauge" class="calendar-seat-gauge">{{ cell.seatGauge }}</span>
              </template>
              <span v-if="cell.hasEvents" class="event-crown">👑</span>
            </div>
          </div>
        </div>

        <!-- Today's Shop & Cast List -->
        <div class="today-section">
          <div class="section-title">本日のシフト <button class="timeline-open-btn" title="今日のタイムライン" aria-label="今日のタイムラインを開く" @click="openTodayTimelineModal">🕒</button></div>
          <template v-for="shop in todayShops" :key="shop.id">
            <div v-if="todayShifts[shop.id] && todayShifts[shop.id].length > 0" class="shop-block" style="background:#1e1e38">
              <div class="shop-block-name cast-name-link" @click="openShopHome(shop.id)">{{ shop.name }}</div>
              <ul class="cast-list">
                <li v-for="shift in todayShifts[shop.id]" :key="shift.staff_id" class="cast-item">
                  <span class="cast-name cast-name-link" @click="openStaffHome(shift.staff_id)">{{ shift.name }}</span>
                  <span style="font-size:0.8rem;color:#a0a0b8">
                    {{ new Date(shift.start_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}
                    〜
                    {{ new Date(shift.end_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}
                  </span>
                </li>
              </ul>
            </div>
          </template>
          <div v-if="Object.keys(todayShifts).length === 0" class="no-data">本日のシフトはありません</div>
        </div>

        <!-- Today's Events -->
        <div v-if="todayEvents && todayEvents.length > 0" class="today-section">
          <div class="section-title">本日のイベント</div>
          <div v-for="ev in todayEvents" :key="ev.id" class="shop-block" style="background:#1e1e38">
            <div class="shop-block-name">
              <template v-if="ev.url"><a :href="ev.url" target="_blank" rel="noopener noreferrer" style="color:#a29bfe;text-decoration:none">{{ ev.title }}</a></template>
              <template v-else>{{ ev.title }}</template>
            </div>
            <div style="font-size:0.8rem;color:#a0a0b8">{{ ev.shop_name }}</div>
            <div v-if="ev.start_at" style="font-size:0.8rem;color:#a0a0b8">
              {{ new Date(ev.start_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}
              <template v-if="ev.end_at"> 〜 {{ new Date(ev.end_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}</template>
            </div>
          </div>
        </div>

      </div>

      <!-- Day Detail Modal -->
      <template v-if="modalOpen">
        <div class="modal-overlay" @click="closeModal">
          <div class="modal-content" @click.stop>
            <div class="modal-header">
              <div class="modal-title-row">
                <h3>{{ selectedDate }}</h3>
                <button class="timeline-open-btn" title="タイムライン" aria-label="タイムラインを開く" @click.stop="openTimelineModal">
                  🕒
                </button>
              </div>
              <button class="modal-close" @click="closeModal">&times;</button>
            </div>
            <div class="modal-body">
              <div v-if="selectedDayShopGroups.length === 0 && (!selectedDayEvents || selectedDayEvents.length === 0)" class="no-data">
                この日のデータはありません
              </div>
              <!-- Events for this day -->
              <div v-if="selectedDayEvents && selectedDayEvents.length > 0" style="margin-bottom:16px">
                <div class="section-title" style="font-size:0.95rem;margin-bottom:8px">イベント</div>
                <div v-for="ev in selectedDayEvents" :key="ev.id" class="shop-block" style="background:#2a1a3e">
                  <div class="shop-block-name">
                    <template v-if="ev.url"><a :href="ev.url" target="_blank" rel="noopener noreferrer" style="color:#a29bfe;text-decoration:none">{{ ev.title }}</a></template>
                    <template v-else>{{ ev.title }}</template>
                  </div>
                  <div class="cast-name-link" style="font-size:0.8rem;color:#a0a0b8" @click.stop="openShopHome(ev.shop_id)">{{ ev.shop_name }}</div>
                  <div v-if="ev.start_at" style="font-size:0.8rem;color:#a0a0b8">{{ formatEventTimeRange(ev.start_at, ev.end_at) }}</div>
                </div>
              </div>
              <!-- Shifts for this day -->
              <div v-if="selectedDayShopGroups.length > 0" class="section-title" style="font-size:0.95rem;margin-bottom:8px">シフト</div>
              <div v-for="group in selectedDayShopGroups" :key="group.shop_id"
                   class="shop-block"
                   :style="{ background: currentUser ? scoreToGradient(group.totalScore) : 'linear-gradient(135deg, #252547 0%, #2f335f 55%, #3b4378 100%)' }">
                <div class="shop-block-name cast-name-link" @click.stop="openShopHome(group.shop_id)">{{ group.shop_name }}</div>
                <div v-if="currentUser" class="shop-block-score">合計スコア: {{ group.totalScore }}</div>
                <ul class="cast-list">
                  <li v-for="staff in group.staffs" :key="staff.staff_id" class="cast-item">
                    <span class="cast-name cast-name-link" @click.stop="openStaffHome(staff.staff_id)">{{ staff.name }}</span>
                    <span class="cast-shift-time">
                      {{ new Date(staff.datetime_begin).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}-{{ new Date(staff.datetime_end).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}
                      <template v-if="activeSeatScoreForStaff(staff) > 0">
                        <br>
                        <a
                          v-if="staff.seat_score_url"
                          :href="staff.seat_score_url"
                          target="_blank"
                          rel="noopener noreferrer"
                          style="color:inherit;text-decoration:none"
                        >{{ formatSeatGauge(activeSeatScoreForStaff(staff)) }}</a>
                        <template v-else>{{ formatSeatGauge(activeSeatScoreForStaff(staff)) }}</template>
                      </template>
                    </span>
                    <span v-if="currentUser" class="cast-score"
                          :class="{ positive: staff.score > 0, negative: staff.score < 0, neutral: staff.score === 0 }">
                      {{ staff.score > 0 ? '+' : '' }}{{ staff.score }}
                    </span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Day Timeline Modal -->
      <template v-if="timelineModalOpen">
        <div class="modal-overlay" @click="closeTimelineModal">
          <div class="modal-content timeline-modal-content" @click.stop>
            <div class="modal-header">
              <h3>{{ selectedDate }} タイムライン</h3>
              <button class="modal-close" @click="closeTimelineModal">&times;</button>
            </div>
            <div class="modal-body timeline-modal-body" @click="closeTimelinePopup">
              <div v-if="timelineShopColumns.length === 0" class="no-data">表示できるシフトがありません</div>
              <div v-else class="timeline-scroll">
                <div class="timeline-layout">
                  <div class="timeline-axis">
                    <div
                      v-for="label in timelineHourSlots"
                      :key="label"
                      class="timeline-axis-row"
                      :class="{ 'timeline-axis-row-current': label === currentTimelineHourLabel }"
                    >
                      <span class="timeline-axis-label">{{ label }}</span>
                    </div>
                    <div class="timeline-axis-terminal-label">24:00</div>
                  </div>
                  <div
                    class="timeline-shop-columns"
                    :style="{
                      gridTemplateColumns: `repeat(${timelineShopColumns.length}, minmax(20px, 1fr))`,
                      minWidth: `${timelineShopColumns.length * 20}px`
                    }"
                  >
                    <div v-for="shop in timelineShopColumns" :key="shop.shop_id" class="timeline-shop-column">
                      <div class="timeline-shop-track">
                        <div
                          v-for="label in timelineHourSlots"
                          :key="shop.shop_id + '-' + label"
                          class="timeline-shop-row"
                          :class="{ 'timeline-shop-row-current': label === currentTimelineHourLabel }"
                        ></div>
                        <div
                          v-for="bar in shop.bars"
                          :key="shop.shop_id + '-' + bar.topPercent + '-' + bar.heightPercent"
                          class="timeline-shift-bar"
                          @click.stop="openTimelinePopup(shop, bar)"
                          :style="{
                            top: bar.topPercent + '%',
                            height: bar.heightPercent + '%',
                            left: 'calc(50% - 5px)',
                            background: bar.color
                          }"
                        ></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div
                v-if="timelinePopup"
                class="timeline-popup"
                @click.stop
              >
                <div class="timeline-popup-shop">{{ timelinePopup.shopName }}</div>
                <div v-for="staff in timelinePopup.staffs" :key="staff.name + '-' + staff.timeLabel" class="timeline-popup-row">
                  <span class="timeline-popup-name">{{ staff.name }}</span>
                  <span class="timeline-popup-time">{{ staff.timeLabel }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Monthly Calendar Modal -->
      <template v-if="monthlyCalendarOpen">
        <div class="modal-overlay" @mousedown.self="monthlyMouseDown = true" @mouseup.self="if (monthlyMouseDown) closeMonthlyCalendar(); monthlyMouseDown = false" @mouseup="monthlyMouseDown = false">
          <div class="modal-content monthly-calendar-modal">
            <div class="modal-header">
              <h3>{{ monthlyCalendarStaff?.name }}</h3>
              <button class="modal-close" @click="closeMonthlyCalendar">&times;</button>
            </div>
            <div class="modal-body">
              <div class="monthly-header-block">
                <div class="monthly-header-month">{{ monthlyMonthName }}</div>
                <div class="monthly-header-year">{{ monthlyYear }}</div>
              </div>
              <div class="monthly-nav">
                <button @click="changeMonth(-1)">&lt;</button>
                <button @click="changeMonth(1)">&gt;</button>
              </div>
              <div v-if="monthlyLoading" class="loading" style="color:#fff">読み込み中</div>
              <div v-else class="monthly-grid">
                <div class="monthly-dow" v-for="d in ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']" :key="d">{{ d }}</div>
                <div v-for="(cell, i) in monthlyCalendarCells" :key="i"
                  class="monthly-cell" :class="{ 'monthly-cell-other': !cell.current }">
                  <div class="monthly-day-num">{{ cell.day }}</div>
                  <div v-for="shift in cell.shifts" :key="shift.id" class="monthly-shift-badge">
                    {{ shift.label }}
                  </div>
                  <div v-for="ev in cell.events" :key="'ev'+ev.id" class="monthly-event-badge" :style="{ background: ev.color }">
                    {{ ev.title }}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>

    </template>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // Unregister any old firebase-messaging-sw.js or other stale SWs
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(reg => {
          const swUrl = reg.active ? reg.active.scriptURL : (reg.installing ? reg.installing.scriptURL : '');
          if (swUrl && !swUrl.endsWith('/sw.js')) {
            reg.unregister();
          }
        });
      });
      // Auto-reload when SW updates (ensures latest JS/CSS are loaded)
      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data && event.data.type === 'SW_UPDATED') {
          if (!sessionStorage.getItem('sw_reloaded')) {
            sessionStorage.setItem('sw_reloaded', '1');
            window.location.reload();
          }
        }
      });
      // Register our main SW
      navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
        .then(reg => { reg.update(); })
        .catch(err => console.error('[SW] registration failed:', err));
    }
  </script>
</body>
</html>
