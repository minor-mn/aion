<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aion</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <span class="header-title" @click="navigate('home')">Aion</span>
      <div class="header-right">
        <template v-if="currentUser">
          <span class="header-user">{{ currentUser.email }}</span>
          <button class="btn btn-secondary btn-sm" @click="handleLogout">ログアウト</button>
          <button class="hamburger-btn" @click="menuOpen = true">&#9776;</button>
        </template>
        <template v-else>
          <button class="btn btn-primary btn-sm" @click="navigate('login')">ログイン</button>
        </template>
      </div>
    </header>

    <!-- Hamburger Menu -->
    <template v-if="menuOpen">
      <div class="menu-overlay" @click="menuOpen = false"></div>
      <div class="menu-panel">
        <button class="menu-close" @click="menuOpen = false">&times;</button>
        <h3>メニュー</h3>
        <button class="menu-item" @click="navigate('shopForm')">店舗管理</button>
        <button class="menu-item" @click="navigate('staffForm')">キャスト管理</button>
        <button class="menu-item" @click="navigate('shiftForm')">出勤登録</button>
      </div>
    </template>

    <!-- Loading -->
    <div v-if="loading" class="loading">読み込み中</div>

    <!-- Main Content -->
    <template v-else>
      <!-- Login Page -->
      <login-page v-if="currentView === 'login'"></login-page>

      <!-- Register Page -->
      <register-page v-if="currentView === 'register'"></register-page>

      <!-- Shop Form -->
      <shop-form-page v-if="currentView === 'shopForm'"></shop-form-page>

      <!-- Staff Form -->
      <staff-form-page v-if="currentView === 'staffForm'"></staff-form-page>

      <!-- Shift Form -->
      <shift-form-page v-if="currentView === 'shiftForm'"></shift-form-page>

      <!-- Home Page -->
      <div v-if="currentView === 'home'" class="container">

        <!-- Calendar (logged in only) -->
        <div v-if="currentUser" class="calendar-section">
          <div class="calendar-header">
            <button class="calendar-nav" @click="prevMonth">&laquo; 前月</button>
            <h2>{{ calendarTitle }}</h2>
            <button class="calendar-nav" @click="nextMonth">翌月 &raquo;</button>
          </div>
          <div class="calendar-grid">
            <div class="calendar-dow" v-for="dow in ['日','月','火','水','木','金','土']" :key="dow">{{ dow }}</div>
            <div v-for="(cell, idx) in calendarDays" :key="idx"
                 class="calendar-cell"
                 :class="{ empty: cell.empty, today: cell.isToday }"
                 :style="{ background: cell.empty ? 'transparent' : cell.gradient }"
                 @click="openDayModal(cell)">
              <span v-if="!cell.empty" class="date-num">{{ cell.day }}</span>
            </div>
          </div>
        </div>

        <!-- Day Detail Modal -->
        <template v-if="modalOpen">
          <div class="modal-overlay" @click="closeModal">
            <div class="modal-content" @click.stop>
              <div class="modal-header">
                <h3>{{ selectedDate }} の出勤</h3>
                <button class="modal-close" @click="closeModal">&times;</button>
              </div>
              <div class="modal-body">
                <div v-if="selectedDayShopGroups.length === 0" class="no-data">
                  この日の出勤データはありません
                </div>
                <div v-for="group in selectedDayShopGroups" :key="group.shop_id"
                     class="shop-block"
                     :style="{ background: scoreToGradient(group.totalScore) }">
                  <div class="shop-block-name">{{ group.shop_name }}</div>
                  <div class="shop-block-score">合計スコア: {{ group.totalScore }}</div>
                  <ul class="cast-list">
                    <li v-for="staff in group.staffs" :key="staff.staff_id" class="cast-item">
                      <span class="cast-name">{{ staff.name }}</span>
                      <span class="cast-score"
                            :class="{ positive: staff.score > 0, negative: staff.score < 0, neutral: staff.score === 0 }">
                        {{ staff.score > 0 ? '+' : '' }}{{ staff.score }}
                      </span>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- Today's Shop & Cast List -->
        <div class="today-section">
          <div class="section-title">本日の出勤</div>
          <div v-if="todayShops.length === 0" class="no-data">店舗が登録されていません</div>
          <template v-for="shop in todayShops" :key="shop.id">
            <div v-if="todayShifts[shop.id] && todayShifts[shop.id].length > 0" class="shop-block" style="background:#f8f9fa">
              <div class="shop-block-name">{{ shop.name }}</div>
              <ul class="cast-list">
                <li v-for="shift in todayShifts[shop.id]" :key="shift.id" class="cast-item">
                  <span class="cast-name">{{ getStaffName(shift.staff_id) }}</span>
                  <span style="font-size:0.8rem;color:#888">
                    {{ new Date(shift.start_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}
                    〜
                    {{ new Date(shift.end_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) }}
                  </span>
                </li>
              </ul>
            </div>
          </template>
          <div v-if="Object.keys(todayShifts).length === 0" class="no-data">本日の出勤はありません</div>
        </div>

      </div>
    </template>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
