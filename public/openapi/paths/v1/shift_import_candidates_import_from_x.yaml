post:
  summary: Xから手動取り込み
  tags:
    - ShiftImportCandidates
  security:
    - bearerAuth: []
  responses:
    "200":
      description: 取り込み結果
      content:
        application/json:
          schema:
            type: object
            properties:
              imported_count:
                type: integer
                example: 3
              had_errors:
                type: boolean
                example: false
              tracked_staff_count:
                type: integer
                example: 5
